<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Collection Master PRO - Rich Layout</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --error: #e74c3c; --bg: #f4f7f6; }
body { font-family: sans-serif; background: var(--bg); padding: 10px; color: #333; margin: 0; }
.container { max-width: 1100px; margin: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
.dashboard { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
@media (min-width: 768px) { .dashboard { display: grid; grid-template-columns: 1fr 1fr; } }
.card { background: #fff; border: 1px solid #eee; padding: 12px; border-radius: 15px; height: 300px; box-sizing: border-box; display: flex; flex-direction: column; }
.chart-container { flex-grow: 1; width: 100%; position: relative; min-height: 0; }
.form-section { background: #edf2f7; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; }
input, select { padding: 12px; border: 1px solid #cbd5e0; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 16px; }

/* カードサイズをUPし、ゆとりを持たせたレイアウト */
.item-card { 
    display: flex; 
    align-items: center; 
    padding: 15px; /* 余白を増やしました */
    border-bottom: 1px solid #eee; 
    background: #fff;
    min-height: 100px; /* 高さを確保 */
}
.item-img { width: 75px; height: 75px; object-fit: cover; border-radius: 8px; margin-right: 15px; background: #eee; flex-shrink: 0; }
.item-main { flex-grow: 1; min-width: 0; padding-right: 10px; }
.item-title { font-weight: bold; font-size: 1.05rem; margin-bottom: 4px; color: var(--primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-details { font-size: 0.85rem; color: #555; line-height: 1.6; } /* 行間を広げて読みやすく */
.tag { font-size: 0.75em; padding: 2px 6px; border-radius: 4px; color: white; margin-right: 5px; font-weight: bold; vertical-align: middle; }
.id-highlight { color: #888; font-family: monospace; background: #f0f0f0; padding: 1px 4px; border-radius: 3px; }
.date-highlight { color: var(--accent); font-weight: bold; }

.btn { padding: 12px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
.btn-success { background: var(--success); color: white; width: 100%; margin-top: 10px; font-size: 1.1em; }
.btn-ghost { background: #e2e8f0; color: #4a5568; font-size: 0.85em; }
.btn-action-group { display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
.btn-action { background: none; border: none; font-size: 1.5em; cursor: pointer; padding: 5px; }
.sync-status { text-align: right; font-size: 0.75em; color: #666; margin-bottom: 5px; }
</style>
</head>
<body>
<div class="container">
    <header style="text-align:center; margin-bottom:15px;">
        <h1 style="color:var(--primary); margin:0; font-size: 1.5em;">Collection PRO</h1>
    </header>

    <div id="sync-status" class="sync-status">⏳ 読み込み中...</div>

    <div class="dashboard">
        <div class="card"><div class="chart-container"><canvas id="pieChart"></canvas></div></div>
        <div class="card"><div class="chart-container"><canvas id="lineChart"></canvas></div></div>
    </div>

    <div class="form-section">
        <div class="form-grid">
            <select id="type"><option value="book">📚 本</option><option value="cd">💿 CD</option><option value="record" selected>🎸 レコード</option></select>
            <input type="text" id="title" placeholder="タイトル（必須）">
            <input type="text" id="creator" placeholder="作者 / アーティスト">
            <input type="text" id="code" placeholder="品番（識別コード）">
            <input type="number" id="price" placeholder="価格（円）">
            <input type="text" id="shop" placeholder="購入店">
            <input type="text" id="location" placeholder="場所">
            <input type="date" id="date">
            <input type="hidden" id="condition" value="中古">
            <input type="hidden" id="edit-index" value="-1">
            <input type="hidden" id="img-url">
        </div>
        <button id="main-save-btn" class="btn btn-success" onclick="saveItem()">保存して同期</button>
        <button id="cancel-btn" class="btn btn-ghost" onclick="resetForm()" style="width:100%; margin-top:5px; display:none;">キャンセル</button>
    </div>

    <div id="list" style="margin-top: 10px; border-top: 1px solid #eee;"></div>
    <div id="load-more-container" style="text-align:center; padding:20px; display:none;">
        <button class="btn btn-primary" onclick="loadMore()" style="width:80%;">さらに表示</button>
    </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbz9Io-YZwOWxwzotMvkHYYTPHUosJ_ZQIEP8Nqze1taq2XwxZY5tPaGZ-iL_z92hGhTeA/exec"; 
let items = [], displayLimit = 30, pieChart = null, lineChart = null;

async function loadData() {
    try {
        const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
        items = await res.json();
        updateUI();
    } catch(e){ document.getElementById('sync-status').innerText = "❌ エラー"; }
}

function updateUI() {
    document.getElementById('sync-status').innerText = "✅ 同期済み (" + items.length + "件)";
    render(true);
}

async function saveItem(){
    const title = document.getElementById('title').value.trim();
    if(!title) return alert("タイトルを入力してください");
    const item = {
        type: document.getElementById('type').value, title: title,
        creator: document.getElementById('creator').value, code: document.getElementById('code').value,
        price: parseInt(document.getElementById('price').value) || 0, shop: document.getElementById('shop').value,
        location: document.getElementById('location').value, date: document.getElementById('date').value || new Date().toISOString().split('T')[0],
        condition: document.getElementById('condition').value, img: document.getElementById('img-url').value
    };
    let tempItems = [...items];
    const editIdx = parseInt(document.getElementById('edit-index').value);
    if(editIdx === -1) tempItems.unshift(item);
    else tempItems[editIdx] = item;
    await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(tempItems) });
    items = tempItems; updateUI(); resetForm();
}

function render(reset = false){
    if(reset) displayLimit = 30;
    const list = document.getElementById('list');
    list.innerHTML = '';
    
    items.slice(0, displayLimit).forEach((item) => {
        const originalIndex = items.indexOf(item);
        const card = document.createElement('div');
        card.className = 'item-card';
        // 品番(ID)を復活させ、サイズにゆとりを持たせた表示
        card.innerHTML = `
            <img src="${item.img || 'https://via.placeholder.com/100?text=No+Img'}" class="item-img">
            <div class="item-main">
                <div class="item-title"><span class="tag" style="background:${item.type==='record'?'#e67e22':item.type==='cd'?'#9b59b6':'#3498db'}">${item.type}</span>${item.title}</div>
                <div class="item-details">
                    👤 ${item.creator || '---'}<br>
                    🆔 <span class="id-highlight">${item.code || '---'}</span><br>
                    💰 ${Number(item.price).toLocaleString()}円 / <span class="date-highlight">📅 ${String(item.date).substring(0,10)}</span>
                </div>
            </div>
            <div class="btn-action-group">
                <button class="btn-action" onclick="editItem(${originalIndex})">📝</button>
                <button class="btn-action" onclick="deleteItem(${originalIndex})" style="color:var(--error)">🗑️</button>
            </div>
        `;
        list.appendChild(card);
    });
    document.getElementById('load-more-container').style.display = items.length > displayLimit ? 'block' : 'none';
    updateCharts();
}

function loadMore() { displayLimit += 30; render(); }

async function deleteItem(idx){
    if(!confirm("削除しますか？")) return;
    items.splice(idx, 1);
    await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(items) });
    updateUI();
}

function resetForm(){
    document.getElementById('edit-index').value = "-1";
    document.getElementById('title').value = "";
    document.getElementById('main-save-btn').innerText = "保存して同期";
    document.getElementById('cancel-btn').style.display = "none";
}

function editItem(idx){
    const i = items[idx];
    document.getElementById('type').value = i.type;
    document.getElementById('title').value = i.title;
    document.getElementById('price').value = i.price;
    document.getElementById('edit-index').value = idx;
    document.getElementById('main-save-btn').innerText = "修正を保存";
    document.getElementById('cancel-btn').style.display = "block";
    window.scrollTo({top: 0, behavior: 'smooth'});
}

function updateCharts() {
    let counts = {book:0, cd:0, record:0, other:0};
    let monthlySpend = {};
    items.forEach(i => {
        counts[i.type || 'other']++;
        let p = parseInt(String(i.price).replace(/[^0-9]/g, "")) || 0;
        let match = String(i.date || "").match(/^(\d{4})[/-](\d{1,2})/);
        if (match) {
            let m = match[1] + "-" + match[2].padStart(2, '0');
            monthlySpend[m] = (monthlySpend[m] || 0) + p;
        }
    });
    if(pieChart) pieChart.destroy();
    pieChart = new Chart(document.getElementById('pieChart'), {
        type: 'doughnut',
        data: { labels: ['本', 'CD', 'レコード'], datasets: [{ data: [counts.book, counts.cd, counts.record], backgroundColor: ['#3498db', '#9b59b6', '#e67e22'] }] },
        options: { maintainAspectRatio: false }
    });
    if(lineChart) lineChart.destroy();
    const sortedMonths = Object.keys(monthlySpend).sort();
    lineChart = new Chart(document.getElementById('lineChart'), {
        type: 'line',
        data: {
            labels: sortedMonths,
            datasets: [{ label: '月別支出(円)', data: sortedMonths.map(m => monthlySpend[m]), borderColor: '#27ae60', fill: true, backgroundColor: 'rgba(39, 174, 96, 0.1)', tension: 0.2 }]
        },
        options: { maintainAspectRatio: false, plugins: { title: { display: true, text: '月別支出推移' } } }
    });
}

document.getElementById('date').value = new Date().toISOString().split('T')[0];
loadData();
</script>
</body>
</html>
