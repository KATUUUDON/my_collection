<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Collection Master PRO - Final Edition</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --error: #e74c3c; --bg: #f4f7f6; }
body { font-family: sans-serif; background: var(--bg); padding: 10px; color: #333; margin: 0; }
.container { max-width: 1100px; margin: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
.dashboard { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
@media (min-width: 768px) { .dashboard { display: grid; grid-template-columns: 1fr 1fr; } }
.card { background: #fff; border: 1px solid #eee; padding: 12px; border-radius: 15px; height: 300px; box-sizing: border-box; display: flex; flex-direction: column; }
.chart-container { flex-grow: 1; width: 100%; position: relative; min-height: 0; }
.form-section { background: #edf2f7; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
input, select { padding: 12px; border: 1px solid #cbd5e0; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 16px; }
.status-msg { margin: 10px 0; padding: 12px; border-radius: 10px; font-weight: bold; text-align: center; display: none; font-size: 0.9em; }
.item-card { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; background: #fff; }
.item-img { width: 70px; height: 70px; object-fit: cover; border-radius: 6px; margin-right: 12px; background: #eee; border: 1px solid #ddd; flex-shrink: 0; }
.item-main { flex-grow: 1; min-width: 0; }
.item-title { font-weight: bold; font-size: 1rem; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-info { font-size: 0.8em; color: #666; }
.tag { font-size: 0.7em; padding: 2px 6px; border-radius: 4px; color: white; margin-right: 5px; font-weight: bold; vertical-align: middle; }
.btn { padding: 12px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
.btn-primary { background: var(--accent); color: white; }
.btn-success { background: var(--success); color: white; width: 100%; margin-top: 15px; font-size: 1.1em; }
.btn-ghost { background: #e2e8f0; color: #4a5568; font-size: 0.85em; }
.sync-status { text-align: right; font-size: 0.75em; color: #666; margin-bottom: 5px; }
</style>
</head>
<body>
<div class="container">
<header style="text-align:center; margin-bottom:15px;">
<h1 style="color:var(--primary); margin:0; font-size: 1.8em;">Collection Master PRO</h1>
<p style="color:#666; font-size: 0.85em;">Final Stability Update 2026</p>
</header>
<div id="sync-status" class="sync-status">読み込み中...</div>
<div class="dashboard">
    <div class="card"><div class="chart-container"><canvas id="pieChart"></canvas></div></div>
    <div class="card"><div class="chart-container"><canvas id="lineChart"></canvas></div></div>
</div>

<div class="form-section">
<div style="display: flex; gap: 8px; margin-bottom: 15px;">
<input type="text" id="api-input" placeholder="ISBN または 品番を入力...">
<button class="btn btn-primary" id="search-btn" onclick="searchWorkflow()" style="white-space: nowrap;">判定</button>
</div>
<div id="result-message" class="status-msg"></div>

<div id="registration-form" style="display: block;">
<div class="form-grid">
<select id="type"><option value="book">📚 本</option><option value="cd">💿 CD</option><option value="record" selected>🎸 レコード</option><option value="other">📦 その他</option></select>
<input type="text" id="title" placeholder="タイトル（必須）">
<input type="text" id="creator" placeholder="作者 / アーティスト">
<input type="text" id="code-display" placeholder="識別コード">
<input type="number" id="price" placeholder="価格（円）">
<input type="text" id="shop" placeholder="購入店舗">
<input type="text" id="location" placeholder="保管場所">
<select id="condition"><option value="新品">新品</option><option value="中古">中古</option><option value="未開封">未開封</option></select>
<input type="date" id="date">
<input type="hidden" id="edit-index" value="-1"><input type="hidden" id="img-url">
</div>
<button id="main-save-btn" class="btn btn-success" onclick="saveItem()">クラウドに保存して同期</button>
</div>
</div>

<div style="background:#fff; padding:12px; border-radius:12px; margin-bottom:20px; border:1px solid #eee;">
<input type="text" id="search" placeholder="タイトル・作者・コードで検索..." style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;" oninput="render()">
<div style="display:flex; gap:8px; margin-top:10px;">
<button class="btn btn-ghost" onclick="sortData('date', 'desc')">📅 新着順</button>
<button class="btn btn-ghost" onclick="sortData('title', 'asc')">🔤 名前順</button>
<button class="btn btn-primary" onclick="exportCSV()" style="margin-left:auto; font-size: 0.8em;">📥CSV保存</button>
</div>
</div>

<div id="list" style="border-radius:15px; overflow: hidden; border: 1px solid #eee;"></div>
</div>

<script>
// ★ここをご自身のGASのURLに差し替えてください★
const GAS_URL = "https://script.google.com/macros/s/AKfycbz9Io-YZwOWxwzotMvkHYYTPHUosJ_ZQIEP8Nqze1taq2XwxZY5tPaGZ-iL_z92hGhTeA/exec";
let items = [], pieChart = null, lineChart = null;

// データ読み込み
async function loadData() {
    document.getElementById('sync-status').innerText = "⏳ 読み込み中...";
    try {
        const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
        const data = await res.json();
        items = Array.isArray(data) ? data : [];
        updateUI();
    } catch(e){ 
        document.getElementById('sync-status').innerText = "❌ 読み込みエラー"; 
    }
}

function updateUI() {
    document.getElementById('sync-status').innerText = "✅ 同期済み (" + items.length + "件)";
    render();
}

// 保存処理
async function saveItem(){
    const title=document.getElementById('title').value.trim();
    if(!title) return alert("タイトルを入力してください");
    
    const saveBtn=document.getElementById('main-save-btn');
    saveBtn.disabled=true;
    saveBtn.innerText="⏳ クラウド保存中...";

    const item={
        type:document.getElementById('type').value, title:title,
        creator:document.getElementById('creator').value.trim(),
        code:document.getElementById('code-display').value.trim(),
        price:parseInt(document.getElementById('price').value)||0,
        shop:document.getElementById('shop').value||'',
        location:document.getElementById('location').value||'',
        condition:document.getElementById('condition').value,
        date:document.getElementById('date').value||new Date().toISOString().split('T')[0],
        img:document.getElementById('img-url').value||''
    };

    const editIdx = parseInt(document.getElementById('edit-index').value);
    const tempItems = [...items];
    if(editIdx === -1) tempItems.unshift(item);
    else tempItems[editIdx] = item;

    try {
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(tempItems) });
        if(res.ok) {
            items = tempItems;
            updateUI();
            resetForm();
            alert("保存完了！");
        } else { throw new Error(); }
    } catch(e) { alert("保存に失敗しました。"); }
    
    saveBtn.disabled=false;
    saveBtn.innerText="クラウドに保存して同期";
}

// リスト表示（全件スクロール版）
function render(){
    const list=document.getElementById('list');
    const query=document.getElementById('search').value.toLowerCase();
    const colors={book:'#3498db',cd:'#9b59b6',record:'#e67e22',other:'#95a5a6'};
    list.innerHTML='';
    
    let filtered = items.filter(i => (i.title+(i.creator||"")+(i.code||"")).toLowerCase().includes(query));
    
    filtered.forEach((item) => {
        const originalIndex = items.indexOf(item);
        const card=document.createElement('div');
        card.className='item-card';
        card.innerHTML=`
        <img src="${item.img||'https://via.placeholder.com/100?text=No+Img'}" class="item-img">
        <div class="item-main">
            <span class="tag" style="background:${colors[item.type]}">${item.type}</span>
            <div class="item-title">${item.title}</div>
            <div class="item-info">👤 ${item.creator || '不明'} | 📍 ${item.location || '-'}</div>
        </div>
        <div style="display:flex; flex-direction:column; gap:5px;">
            <button class="btn btn-ghost" onclick="editItem(${originalIndex})">📝</button>
        </div>`;
        list.appendChild(card);
    });
    updateCharts();
}

// グラフ更新（日付のゆらぎに対応）
function updateCharts() {
    let counts = {book:0, cd:0, record:0, other:0};
    let monthlySpend = {};
    
    items.forEach(item => {
        counts[item.type]++;
        // 日付形式を統一して集計 (YYYY-MM)
        let d = item.date ? item.date.toString().replace(/\//g, '-') : "";
        let m = d.substring(0, 7);
        if (m && m.match(/^\d{4}-\d{2}$/)) {
            monthlySpend[m] = (monthlySpend[m] || 0) + (parseInt(item.price) || 0);
        }
    });

    if (pieChart) pieChart.destroy();
    pieChart = new Chart(document.getElementById('pieChart'), {
        type: 'doughnut',
        data: { labels: ['本', 'CD', 'レコード', '他'], datasets: [{ data: [counts.book, counts.cd, counts.record, counts.other], backgroundColor: ['#3498db', '#9b59b6', '#e67e22', '#95a5a6'] }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: 'カテゴリ内訳' } } }
    });

    if (lineChart) lineChart.destroy();
    const sortedMonths = Object.keys(monthlySpend).sort().slice(-6);
    lineChart = new Chart(document.getElementById('lineChart'), {
        type: 'line',
        data: { labels: sortedMonths, datasets: [{ label: '支出 (円)', data: sortedMonths.map(m => monthlySpend[m]), borderColor: '#27ae60', tension: 0.4 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: '月別支出（最近6ヶ月）' } } }
    });
}

// 編集・ソート・リセット
function editItem(idx){
    const item=items[idx];
    document.getElementById('type').value=item.type;
    document.getElementById('title').value=item.title;
    document.getElementById('creator').value=item.creator;
    document.getElementById('code-display').value=item.code;
    document.getElementById('price').value=item.price;
    document.getElementById('shop').value=item.shop;
    document.getElementById('location').value=item.location;
    document.getElementById('condition').value=item.condition;
    document.getElementById('date').value=item.date ? item.date.toString().replace(/\//g, '-') : "";
    document.getElementById('edit-index').value=idx;
    window.scrollTo({top:0, behavior:'smooth'});
}
function sortData(k,o){
    items.sort((a,b)=>o==='asc'?(a[k]||"").toString().localeCompare((b[k]||"").toString()):(b[k]||"").toString().localeCompare((a[k]||"").toString()));
    render();
}
function resetForm(){
    document.getElementById('title').value="";
    document.getElementById('creator').value="";
    document.getElementById('edit-index').value="-1";
}
function exportCSV(){
    let csv = "\uFEFF種別,タイトル,作者,コード,価格,店,場所,状態,日付\n" + items.map(i=>`"${i.type}","${i.title}","${i.creator}","${i.code}","${i.price}","${i.shop}","${i.location}","${i.condition}","${i.date}"`).join("\n");
    const link = document.createElement("a");
    link.href = URL.createObjectURL(new Blob([csv], {type:"text/csv"}));
    link.download = "backup.csv";
    link.click();
}
async function searchWorkflow(){
    const input = document.getElementById('api-input').value.trim();
    if(!input) return;
    document.getElementById('code-display').value = input;
}

document.getElementById('date').value=new Date().toISOString().split('T')[0];
loadData();
</script>
</body>
</html>
