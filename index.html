<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Collection Master PRO - Search Enhanced</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --error: #e74c3c; --bg: #f4f7f6; }
body { font-family: sans-serif; background: var(--bg); padding: 5px; color: #333; margin: 0; }
.container { max-width: 100%; margin: auto; background: white; padding: 12px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }

/* グラフエリア */
.dashboard { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
@media (min-width: 768px) { .dashboard { display: grid; grid-template-columns: 1fr 1fr; } }
.card { background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 12px; height: 260px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.chart-container { width: 85%; height: 85%; position: relative; }

/* --- 検索窓：ボタン付きに改良 --- */
.search-section { margin: 10px 0 20px; position: relative; display: flex; gap: 8px; }
.search-input { 
    flex: 1; 
    padding: 15px 20px; 
    border: 2px solid var(--accent); 
    border-radius: 30px; 
    font-size: 1.1em; 
    box-sizing: border-box; 
    outline: none; 
    box-shadow: 0 4px 10px rgba(52, 152, 219, 0.1);
}
.search-btn { 
    background: var(--accent); 
    color: white; 
    border: none; 
    border-radius: 50%; 
    width: 50px; 
    height: 50px; 
    font-size: 1.4rem; 
    cursor: pointer; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
}

/* フォーム、カードなどのスタイルは継承（省略なし） */
.form-section { background: #edf2f7; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; }
input, select { padding: 12px; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; }
.item-card { display: flex; align-items: flex-start; padding: 18px 10px; border-bottom: 1px solid #f0f0f0; background: #fff; width: 100%; box-sizing: border-box; }
.item-img { width: 95px; height: 95px; object-fit: cover; border-radius: 10px; margin-right: 15px; flex-shrink: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.item-main { flex: 1; min-width: 0; }
.item-title { font-weight: 900; font-size: 1.3rem; color: #1a202c; line-height: 1.3; margin-bottom: 6px; }
.item-details { font-size: 0.95rem; color: #4a5568; line-height: 1.6; }
.tag { font-size: 0.8rem; padding: 2px 6px; border-radius: 4px; color: white; margin-right: 6px; font-weight: bold; }
.id-label { background: #e2e8f0; padding: 2px 5px; border-radius: 4px; font-family: monospace; font-weight: bold; color: #2c3e50; }
.date-label { color: var(--accent); font-weight: bold; }
.btn-action-group { display: flex; flex-direction: column; gap: 15px; margin-left: 10px; flex-shrink: 0; }
.btn-action { background: none; border: none; font-size: 1.7rem; cursor: pointer; padding: 2px; }
.sync-status { text-align: right; font-size: 0.8rem; color: #718096; margin-bottom: 5px; }
</style>
</head>
<body>
<div class="container">
    <div id="sync-status" class="sync-status">⏳ 接続中...</div>

    <div class="dashboard">
        <div class="card"><div class="chart-container"><canvas id="pieChart"></canvas></div></div>
        <div class="card"><div class="chart-container"><canvas id="lineChart"></canvas></div></div>
    </div>

    <div class="search-section">
        <input type="text" id="search" class="search-input" placeholder="タイトル、作者、品番で検索..." onkeypress="if(event.key==='Enter') render(true)">
        <button class="search-btn" onclick="render(true)">🔍</button>
    </div>

    <div class="form-section">
        <div class="form-grid">
            <select id="type"><option value="book">📚 本</option><option value="cd">💿 CD</option><option value="record" selected>🎸 レコード</option></select>
            <input type="text" id="title" placeholder="タイトル（必須）">
            <input type="text" id="creator" placeholder="作者">
            <input type="text" id="code" placeholder="品番">
            <input type="number" id="price" placeholder="価格（円）">
            <input type="text" id="shop" placeholder="購入店">
            <input type="text" id="location" placeholder="保管場所">
            <input type="date" id="date">
            <input type="hidden" id="edit-index" value="-1"><input type="hidden" id="img-url">
        </div>
        <button id="main-save-btn" style="background: var(--success); color: white; width: 100%; margin-top: 10px; font-size: 1.1em; padding:14px; border:none; border-radius:10px; font-weight:bold;" onclick="saveItem()">クラウドに保存して同期</button>
        <button id="cancel-btn" style="background: #cbd5e0; width:100%; margin-top:5px; display:none; padding:10px; border:none; border-radius:8px;" onclick="resetForm()">キャンセル</button>
    </div>

    <div id="list"></div>
    <div id="load-more-container" style="text-align:center; padding:20px; display:none;">
        <button style="background: var(--accent); color: white; padding: 12px 30px; border: none; border-radius: 25px; font-weight: bold;" onclick="loadMore()">さらに表示する</button>
    </div>
</div>

<script>
// --- 以下、ロジック（前回の完成版を継承） ---
const GAS_URL = "https://script.google.com/macros/s/AKfycbz9Io-YZwOWxwzotMvkHYYTPHUosJ_ZQIEP8Nqze1taq2XwxZY5tPaGZ-iL_z92hGhTeA/exec"; 
let items = [], displayLimit = 30, pieChart = null, lineChart = null;

function formatDate(dateInput) {
    if (!dateInput) return "---";
    const d = new Date(dateInput);
    if (isNaN(d.getTime())) return String(dateInput).substring(0, 10);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}/${m}/${day}`;
}

async function loadData() {
    try {
        const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
        items = await res.json();
        updateUI();
    } catch(e){ document.getElementById('sync-status').innerText = "❌ 接続エラー"; }
}

function updateUI() {
    document.getElementById('sync-status').innerText = "✅ 同期完了 (" + items.length + "件)";
    render(true);
}

async function saveItem(){
    const title = document.getElementById('title').value.trim();
    if(!title) return alert("タイトルを入力してください");
    const item = {
        type: document.getElementById('type').value, title: title,
        creator: document.getElementById('creator').value, code: document.getElementById('code').value,
        price: parseInt(document.getElementById('price').value) || 0, shop: document.getElementById('shop').value,
        location: document.getElementById('location').value, 
        date: document.getElementById('date').value || new Date().toISOString().split('T')[0],
        img: document.getElementById('img-url').value
    };
    let tempItems = [...items];
    const editIdx = parseInt(document.getElementById('edit-index').value);
    if(editIdx === -1) tempItems.unshift(item);
    else tempItems[editIdx] = item;
    await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(tempItems) });
    items = tempItems; updateUI(); resetForm();
}

function render(reset = false){
    if(reset) displayLimit = 30;
    const list = document.getElementById('list');
    const query = document.getElementById('search').value.toLowerCase();
    list.innerHTML = '';
    const filtered = items.filter(i => (String(i.title) + String(i.creator || "") + String(i.code || "")).toLowerCase().includes(query));
    filtered.slice(0, displayLimit).forEach((item) => {
        const originalIndex = items.indexOf(item);
        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
            <img src="${item.img || 'https://via.placeholder.com/150?text=No+Img'}" class="item-img">
            <div class="item-main">
                <div><span class="tag" style="background:${item.type==='record'?'#e67e22':item.type==='cd'?'#9b59b6':'#3498db'}">${item.type}</span></div>
                <div class="item-title">${item.title}</div>
                <div class="item-details">
                    👤 ${item.creator || '---'}<br>
                    🆔 <span class="id-label">${item.code || '---'}</span><br>
                    💰 ${Number(item.price).toLocaleString()}円 / <span class="date-label">📅 ${formatDate(item.date)}</span>
                </div>
            </div>
            <div class="btn-action-group">
                <button class="btn-action" onclick="editItem(${originalIndex})">📝</button>
                <button class="btn-action" onclick="deleteItem(${originalIndex})" style="color:var(--error)">🗑️</button>
            </div>
        `;
        list.appendChild(card);
    });
    document.getElementById('load-more-container').style.display = filtered.length > displayLimit ? 'block' : 'none';
    updateCharts();
}

function loadMore() { displayLimit += 30; render(); }

async function deleteItem(idx){
    if(!confirm("削除しますか？")) return;
    items.splice(idx, 1);
    await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(items) });
    updateUI();
}

function editItem(idx){
    const i = items[idx];
    document.getElementById('type').value = i.type;
    document.getElementById('title').value = i.title;
    document.getElementById('price').value = i.price;
    document.getElementById('creator').value = i.creator;
    document.getElementById('code').value = i.code;
    document.getElementById('shop').value = i.shop;
    document.getElementById('location').value = i.location;
    const d = new Date(i.date);
    if(!isNaN(d.getTime())){ document.getElementById('date').value = d.toISOString().split('T')[0]; }
    document.getElementById('edit-index').value = idx;
    document.getElementById('main-save-btn').innerText = "修正を保存する";
    document.getElementById('cancel-btn').style.display = "block";
    window.scrollTo({top: 0, behavior: 'smooth'});
}

function resetForm(){
    document.getElementById('edit-index').value = "-1";
    document.getElementById('title').value = "";
    document.getElementById('main-save-btn').innerText = "保存して同期";
    document.getElementById('cancel-btn').style.display = "none";
}

function updateCharts() {
    let counts = {book:0, cd:0, record:0, other:0};
    let monthlySpend = {};
    items.forEach(i => {
        counts[i.type || 'other']++;
        let p = parseInt(String(i.price).replace(/[^0-9]/g, "")) || 0;
        let d = new Date(i.date);
        if (!isNaN(d.getTime())) {
            let m = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0');
            monthlySpend[m] = (monthlySpend[m] || 0) + p;
        }
    });
    if(pieChart) pieChart.destroy();
    pieChart = new Chart(document.getElementById('pieChart'), {
        type: 'doughnut',
        data: { labels: ['本', 'CD', 'レコード'], datasets: [{ data: [counts.book, counts.cd, counts.record], backgroundColor: ['#3498db', '#9b59b6', '#e67e22'] }] },
        options: { maintainAspectRatio: false, layout: { padding: 10 } }
    });
    if(lineChart) lineChart.destroy();
    const sortedMonths = Object.keys(monthlySpend).sort();
    lineChart = new Chart(document.getElementById('lineChart'), {
        type: 'line',
        data: {
            labels: sortedMonths,
            datasets: [{ label: '月別支出', data: sortedMonths.map(m => monthlySpend[m]), borderColor: '#27ae60', fill: true, backgroundColor: 'rgba(39, 174, 96, 0.1)', tension: 0.3 }]
        },
        options: { maintainAspectRatio: false, plugins: { title: { display: true, text: '収支推移' } } }
    });
}

document.getElementById('date').value = new Date().toISOString().split('T')[0];
loadData();
</script>
</body>
</html>
