<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Collection Master PRO (Ultimate Edition)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --error: #e74c3c; --bg: #f4f7f6; }
body { font-family: sans-serif; background: var(--bg); padding: 10px; color: #333; margin: 0; }
.container { max-width: 1100px; margin: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }

/* ダッシュボードのレイアウト調整（スマホ優先） */
.dashboard { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
@media (min-width: 768px) { .dashboard { display: grid; grid-template-columns: 1fr 1fr; } }

.card { background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 15px; height: 260px; box-sizing: border-box; position: relative; overflow: hidden; }
.chart-container { height: 230px; width: 100%; position: relative; }

.form-section { background: #edf2f7; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
input, select { padding: 10px; border: 1px solid #cbd5e0; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 14px; }

.status-msg { margin: 10px 0; padding: 12px; border-radius: 10px; font-weight: bold; text-align: center; display: none; font-size: 0.9em; }
.msg-found { background: #e8f4fd; color: #2980b9; border: 1px solid #3498db; }
.msg-notfound { background: #e9f7ef; color: #27ae60; border: 1px solid #2ecc71; }
.msg-manual { background: #fff3e0; color: #e67e22; border: 1px solid #f39c12; }

.item-card { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; background: #fff; }
.item-img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; margin-right: 12px; background: #eee; }
.item-main { flex-grow: 1; min-width: 0; }
.item-main div { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tag { font-size: 0.65em; padding: 2px 6px; border-radius: 4px; color: white; margin-right: 4px; font-weight: bold; }

.btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }
.btn-primary { background: var(--accent); color: white; }
.btn-success { background: var(--success); color: white; width: 100%; margin-top: 10px; font-size: 1em; }
.btn-ghost { background: #e2e8f0; color: #4a5568; font-size: 0.8em; }
.sync-status { text-align: right; font-size: 0.75em; color: #666; margin-bottom: 5px; }

@media (max-width: 600px) { 
  .item-card { flex-direction: row; text-align: left; }
  header h1 { font-size: 1.5em; }
}
</style>
</head>
<body>
<div class="container">
<header style="text-align:center; margin-bottom:15px;">
<h1 style="color:var(--primary); margin:0;">Collection Master PRO</h1>
<p style="color:#666; font-size: 0.8em;">2026年・Mobile Optimized</p>
</header>

<div id="sync-status" class="sync-status">同期中...</div>

<div class="dashboard">
    <div class="card"><div class="chart-container"><canvas id="pieChart"></canvas></div></div>
    <div class="card"><div class="chart-container"><canvas id="lineChart"></canvas></div></div>
</div>

<div class="form-section">
<div style="display: flex; gap: 8px; margin-bottom: 12px;">
<input type="text" id="api-input" placeholder="ISBN/品番を入力...">
<button class="btn btn-primary" id="search-btn" onclick="searchWorkflow()" style="white-space: nowrap;">判定</button>
</div>
<div id="result-message" class="status-msg"></div>
<div id="registration-form" style="display: none;">
<div class="form-grid">
<select id="type"><option value="book">📚 本</option><option value="cd">💿 CD</option><option value="record" selected>🎸 レコード</option><option value="other">📦 その他</option></select>
<input type="text" id="title" placeholder="タイトル（必須）">
<input type="text" id="creator" placeholder="アーティスト">
<input type="text" id="code-display" placeholder="識別コード">
<input type="number" id="price" placeholder="価格">
<input type="text" id="shop" placeholder="購入店">
<input type="text" id="location" placeholder="場所">
<select id="condition"><option value="新品">新品</option><option value="中古">中古</option><option value="未開封">未開封</option></select>
<input type="date" id="date">
<input type="hidden" id="edit-index" value="-1"><input type="hidden" id="img-url">
</div>
<button id="main-save-btn" class="btn btn-success" onclick="saveItem()">保存して同期</button>
</div>
</div>

<div style="background:#fff; padding:10px; border-radius:12px; margin-bottom:15px; border:1px solid #eee;">
<input type="text" id="search" placeholder="検索..." style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;" oninput="render(true)">
<div style="display:flex; flex-wrap:wrap; gap:5px;">
<button class="btn btn-ghost" onclick="sortData('date', 'desc')">📅新着</button>
<button class="btn btn-ghost" onclick="sortData('title', 'asc')">🔤名前</button>
<button class="btn btn-primary" onclick="exportCSV()" style="margin-left:auto; font-size: 0.8em;">📥CSV</button>
</div>
</div>

<div id="list" style="border-radius:15px; overflow: hidden; border: 1px solid #eee;"></div>
<div id="load-more-container" style="display:none; text-align:center; padding:15px;">
<button class="btn btn-ghost" onclick="displayLimit += 50; render();">さらに表示</button>
</div>
</div>

<script>
// ★ここを自分のGASのURLに差し替える★
const GAS_URL = "https://script.google.com/macros/s/AKfycbz9Io-YZwOWxwzotMvkHYYTPHUosJ_ZQIEP8Nqze1taq2XwxZY5tPaGZ-iL_z92hGhTeA/exec";

let items = [], displayLimit = 30, pieChart = null, lineChart = null;

async function loadData() {
try {
const res = await fetch(GAS_URL);
items = await res.json();
document.getElementById('sync-status').innerText = "✅ 同期済み (" + items.length + "件)";
render();
} catch(e){ document.getElementById('sync-status').innerText = "❌ 同期エラー"; }
}

async function searchWorkflow() {
const input = document.getElementById('api-input').value.trim();
if(!input) return;
const msgArea = document.getElementById('result-message');
const formArea = document.getElementById('registration-form');
const duplicate = items.find(i => (i.code||'').toString() === input);
if(duplicate){
msgArea.className="status-msg msg-found";
msgArea.innerHTML=`⚠️ 登録済：「${duplicate.title}」`;
}
await autoFetch(input);
msgArea.style.display="block"; formArea.style.display="block";
document.getElementById('edit-index').value="-1";
formArea.scrollIntoView({behavior:'smooth'});
}

async function autoFetch(input){
document.getElementById('code-display').value=input;
const type=document.getElementById('type').value;
try{
if(type==='book'){
const res=await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${input.replace(/-/g,'')}`);
const data=await res.json();
if(data.totalItems>0){
const info=data.items[0].volumeInfo;
document.getElementById('title').value=info.title||'';
document.getElementById('creator').value=info.authors?info.authors.join(', '):'';
document.getElementById('img-url').value=info.imageLinks?info.imageLinks.thumbnail:'';
}
}
}catch(e){}
}

async function saveItem(){
const title=document.getElementById('title').value.trim();
if(!title) return alert("タイトル必須");
const saveBtn=document.getElementById('main-save-btn');
saveBtn.disabled=true;
const item={
type:document.getElementById('type').value, title:title,
creator:document.getElementById('creator').value.trim(),
code:document.getElementById('code-display').value.trim(),
price:parseInt(document.getElementById('price').value)||0,
shop:document.getElementById('shop').value||'',
location:document.getElementById('location').value||'',
condition:document.getElementById('condition').value,
date:document.getElementById('date').value||new Date().toISOString().split('T')[0],
img:document.getElementById('img-url').value||''
};
const index=parseInt(document.getElementById('edit-index').value);
if(index===-1) items.unshift(item); else items[index]=item;
if(await syncToCloud()){
resetForm(); document.getElementById('registration-form').style.display="none";
document.getElementById('result-message').style.display="none";
render(true); await loadData();
}
saveBtn.disabled=false;
}

async function syncToCloud(){
document.getElementById('sync-status').innerText="⏳ 同期中...";
try{
await fetch(GAS_URL,{method:'POST',body:JSON.stringify(items)});
return true;
}catch(e){ return false; }
}

function render(resetLimit=false){
if(resetLimit) displayLimit=30;
const list=document.getElementById('list');
const query=document.getElementById('search').value.toLowerCase();
list.innerHTML='';
let filtered = items.filter(i => (i.title+i.creator+i.code).toLowerCase().includes(query));
filtered.slice(0, displayLimit).forEach((item, idx) => {
const card=document.createElement('div');
card.className='item-card';
card.innerHTML=`
<img src="${item.img||'https://via.placeholder.com/100?text=No+Img'}" class="item-img">
<div class="item-main">
<span class="tag" style="background:#3498db">${item.type}</span>
<div style="font-weight:bold; font-size:0.9em;">${item.title}</div>
<div style="font-size:0.75em;color:#666;">${item.creator}</div>
</div>
<button class="btn btn-ghost" onclick="deleteItem(${items.indexOf(item)})">🗑</button>`;
list.appendChild(card);
});
setTimeout(updateCharts, 300);
}

function deleteItem(index){
if(confirm("削除しますか？")){ items.splice(index,1); syncToCloud().then(render); }
}

function sortData(key,order){
items.sort((a,b)=>order==='asc'?(a[key]||'').localeCompare(b[key]||''):(b[key]||'').localeCompare(a[key]||''));
render(true);
}

function resetForm(){ document.querySelectorAll('#registration-form input').forEach(i=>i.value=''); }

function updateCharts() {
    let counts = {book: 0, cd: 0, record: 0, other: 0};
    let monthlySpend = {};
    items.forEach(item => {
        counts[item.type]++;
        const m = (item.date || "").substring(0, 7);
        if (m) monthlySpend[m] = (monthlySpend[m] || 0) + (parseInt(item.price) || 0);
    });

    const opt = { 
        responsive: true, 
        maintainAspectRatio: false, 
        plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } }
    };

    if (pieChart) pieChart.destroy();
    pieChart = new Chart(document.getElementById('pieChart'), {
        type: 'doughnut',
        data: { labels: ['本', 'CD', 'レコード', '他'], datasets: [{ data: Object.values(counts), backgroundColor: ['#3498db', '#9b59b6', '#e67e22', '#95a5a6'] }] },
        options: opt
    });

    if (lineChart) lineChart.destroy();
    const sorted = Object.keys(monthlySpend).sort().slice(-6);
    lineChart = new Chart(document.getElementById('lineChart'), {
        type: 'line',
        data: { labels: sorted, datasets: [{ label: '円', data: sorted.map(m => monthlySpend[m]), borderColor: '#27ae60', tension: 0.4 }] },
        options: { ...opt, scales: { y: { ticks: { font: { size: 8 } } }, x: { ticks: { font: { size: 8 } } } } }
    });
}

function exportCSV() {
    let csv = "種別,タイトル,作者,価格,日付\n" + items.map(i => `"${i.type}","${i.title}","${i.creator}","${i.price}","${i.date}"`).join("\n");
    const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: "text/csv" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "backup.csv";
    link.click();
}

loadData();
</script>
</body>
</html>
