<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Collection Master PRO - Stable</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --error: #e74c3c; --bg: #f4f7f6; }
body { font-family: sans-serif; background: var(--bg); padding: 10px; color: #333; margin: 0; }
.container { max-width: 1100px; margin: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
.dashboard { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
@media (min-width: 768px) { .dashboard { display: grid; grid-template-columns: 1fr 1fr; } }
.card { background: #fff; border: 1px solid #eee; padding: 12px; border-radius: 15px; height: 280px; box-sizing: border-box; display: flex; flex-direction: column; }
.chart-container { flex-grow: 1; width: 100%; position: relative; min-height: 0; }
.form-section { background: #edf2f7; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
input, select { padding: 12px; border: 1px solid #cbd5e0; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 16px; }
.status-msg { margin: 10px 0; padding: 12px; border-radius: 10px; font-weight: bold; text-align: center; display: none; font-size: 0.9em; }
.msg-found { background: #e8f4fd; color: #2980b9; border: 1px solid #3498db; }
.item-card { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; background: #fff; }
.item-img { width: 70px; height: 70px; object-fit: cover; border-radius: 6px; margin-right: 12px; background: #eee; border: 1px solid #ddd; flex-shrink: 0; }
.item-main { flex-grow: 1; min-width: 0; }
.item-title { font-weight: bold; font-size: 1rem; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-info { font-size: 0.8em; color: #666; }
.tag { font-size: 0.7em; padding: 2px 6px; border-radius: 4px; color: white; margin-right: 5px; font-weight: bold; vertical-align: middle; }
.btn { padding: 12px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
.btn-primary { background: var(--accent); color: white; }
.btn-success { background: var(--success); color: white; width: 100%; margin-top: 15px; font-size: 1.1em; }
.btn-success:disabled { opacity: 0.6; }
.btn-ghost { background: #e2e8f0; color: #4a5568; font-size: 0.85em; }
.sync-status { text-align: right; font-size: 0.75em; color: #666; margin-bottom: 5px; }
</style>
</head>
<body>
<div class="container">
<header style="text-align:center; margin-bottom:15px;">
<h1 style="color:var(--primary); margin:0; font-size: 1.8em;">Collection Master PRO</h1>
<p style="color:#666; font-size: 0.85em;">Stable Edition 2026</p>
</header>
<div id="sync-status" class="sync-status">読み込み中...</div>
<div class="dashboard">
    <div class="card"><div class="chart-container"><canvas id="pieChart"></canvas></div></div>
    <div class="card"><div class="chart-container"><canvas id="lineChart"></canvas></div></div>
</div>
<div class="form-section">
<div style="display: flex; gap: 8px; margin-bottom: 15px;">
<input type="text" id="api-input" placeholder="ISBN または 品番を入力...">
<button class="btn btn-primary" id="search-btn" onclick="searchWorkflow()" style="white-space: nowrap;">判定</button>
</div>
<div id="result-message" class="status-msg"></div>
<div id="registration-form" style="display: block;">
<div class="form-grid">
<select id="type"><option value="book">📚 本</option><option value="cd">💿 CD</option><option value="record" selected>🎸 レコード</option><option value="other">📦 その他</option></select>
<input type="text" id="title" placeholder="タイトル（必須）">
<input type="text" id="creator" placeholder="作者 / アーティスト">
<input type="text" id="code-display" placeholder="識別コード">
<input type="number" id="price" placeholder="価格（円）">
<input type="text" id="shop" placeholder="購入店舗">
<input type="text" id="location" placeholder="保管場所">
<select id="condition"><option value="新品">新品</option><option value="中古">中古</option><option value="未開封">未開封</option></select>
<input type="date" id="date">
<input type="hidden" id="edit-index" value="-1"><input type="hidden" id="img-url">
</div>
<button id="main-save-btn" class="btn btn-success" onclick="saveItem()">クラウドに保存して同期</button>
</div>
</div>
<div style="background:#fff; padding:12px; border-radius:12px; margin-bottom:20px; border:1px solid #eee;">
<input type="text" id="search" placeholder="検索..." style="width:100%; padding:10px; margin-bottom:10px;" oninput="render(true)">
<div style="display:flex; gap:8px;">
<button class="btn btn-ghost" onclick="sortData('date', 'desc')">📅 新着</button>
<button class="btn btn-ghost" onclick="sortData('title', 'asc')">🔤 名前</button>
<button class="btn btn-primary" onclick="exportCSV()" style="margin-left:auto; font-size: 0.8em;">📥CSV保存</button>
</div>
</div>
<div id="list"></div>
</div>

<script>
// ★ここをご自身のGASのURLに差し替える★
const GAS_URL = "https://script.google.com/macros/s/AKfycbz9Io-YZwOWxwzotMvkHYYTPHUosJ_ZQIEP8Nqze1taq2XwxZY5tPaGZ-iL_z92hGhTeA/exec";
let items = [], pieChart = null, lineChart = null;

async function loadData() {
    document.getElementById('sync-status').innerText = "⏳ 読み込み中...";
    try {
        const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
        const data = await res.json();
        items = Array.isArray(data) ? data : [];
        updateUI();
    } catch(e){ 
        document.getElementById('sync-status').innerText = "❌ 読み込みエラー"; 
    }
}

function updateUI() {
    document.getElementById('sync-status').innerText = "✅ 同期済み (" + items.length + "件)";
    render();
}

async function saveItem(){
    const title=document.getElementById('title').value.trim();
    if(!title) return alert("タイトルを入力してください");
    
    const saveBtn=document.getElementById('main-save-btn');
    saveBtn.disabled=true;
    saveBtn.innerText="⏳ クラウド保存中...";

    const item={
        type:document.getElementById('type').value, title:title,
        creator:document.getElementById('creator').value, code:document.getElementById('code-display').value,
        price:parseInt(document.getElementById('price').value)||0, shop:document.getElementById('shop').value,
        location:document.getElementById('location').value, condition:document.getElementById('condition').value,
        date:document.getElementById('date').value||new Date().toISOString().split('T')[0],
        img:document.getElementById('img-url').value
    };

    const tempItems = [...items];
    tempItems.unshift(item);

    try {
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(tempItems) });
        if(res.ok) {
            items = tempItems;
            updateUI();
            resetForm();
            alert("保存完了！スプレッドシートが正常化されました。");
        } else { throw new Error(); }
    } catch(e) { alert("保存に失敗しました。GASの設定を確認してください。"); }
    
    saveBtn.disabled=false;
    saveBtn.innerText="クラウドに保存して同期";
}

function resetForm(){ 
    document.getElementById('title').value = "";
    document.getElementById('creator').value = "";
    document.getElementById('code-display').value = "";
}

function render(){
    const list=document.getElementById('list');
    list.innerHTML='';
    items.slice(0, 30).forEach((item) => {
        const card=document.createElement('div');
        card.className='item-card';
        card.innerHTML=`<img src="${item.img||'https://via.placeholder.com/100?text=No+Img'}" class="item-img">
        <div class="item-main">
            <div class="item-title">${item.title}</div>
            <div class="item-info">👤 ${item.creator || '不明'} | 📍 ${item.location || '-'}</div>
        </div>`;
        list.appendChild(card);
    });
    updateCharts();
}

function updateCharts() {
    let counts = {book:0, cd:0, record:0, other:0};
    items.forEach(i => counts[i.type]++);
    const ctx = document.getElementById('pieChart');
    if (pieChart) pieChart.destroy();
    pieChart = new Chart(ctx, {
        type: 'doughnut',
        data: { labels: ['本', 'CD', 'レコード', '他'], datasets: [{ data: [counts.book, counts.cd, counts.record, counts.other], backgroundColor: ['#3498db', '#9b59b6', '#e67e22', '#95a5a6'] }] }
    });
}

loadData();
</script>
</body>
</html>
